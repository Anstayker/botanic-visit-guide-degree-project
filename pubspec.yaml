name: botanic_guide
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Service Locator
  get_it: ^9.2.0
  # Value equality
  equatable: ^2.0.8
  # Functional programming utilities
  dartz: ^0.10.1
  # Local cache
  shared_preferences: ^2.5.4
  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Bloc
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  # Geo-location
  geolocator: ^14.0.2
  # Compass
  flutter_compass: ^0.8.1
  # To merge Streams
  rxdart: ^0.28.0
  # Firebase
  firebase_core: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/plants/
    - assets/data/
