name: botanic_guide
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Typography
  google_fonts: ^8.0.2
  # Service Locator
  get_it: ^9.2.0
  # Value equality
  equatable: ^2.0.8
  # Functional programming utilities
  dartz: ^0.10.1
  # Local cache
  shared_preferences: ^2.5.4
  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Bloc
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  # Geo-location
  geolocator: ^14.0.2
  # Compass
  flutter_compass: ^0.8.1
  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  # To merge Streams
  rxdart: ^0.28.0
  # Firebase
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  # Internet access check
  internet_connection_checker_plus: ^2.8.0
  # QR Scanner
  mobile_scanner: ^7.2.0
  # External links
  url_launcher: 6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/plants/
    - assets/data/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/static/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat/static/Montserrat-Italic.ttf
          style: italic
        - asset: assets/fonts/Montserrat/static/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat/static/Montserrat-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Montserrat/static/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat/static/Montserrat-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend/static/Lexend-Regular.ttf
        - asset: assets/fonts/Lexend/static/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lexend/static/Lexend-Bold.ttf
          weight: 700
